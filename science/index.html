<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God Isn't Real - Filly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Lato:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #e0e0e0;
            --dim: #888;
            --accent: #ff2a2a;
            --accent-glow: rgba(255, 42, 42, 0.4);
            --glass: rgba(255, 255, 255, 0.03);
            --stroke: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            line-height: 1.7;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(255, 42, 42, 0.08) 0%, transparent 50%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.2) 2px, rgba(0,0,0,0.2) 4px);
            background-attachment: fixed;
        }

        ::selection {
            background: var(--accent);
            color: #000;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        nav {
            margin-bottom: 60px;
        }

        nav a {
            color: var(--dim);
            text-decoration: none;
            font-family: 'DM Mono', monospace;
            font-size: 0.9rem;
            transition: color 0.3s ease, text-shadow 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        nav a:hover {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        h1 {
            font-family: 'Lato', sans-serif;
            font-weight: 900;
            font-size: 3.5rem;
            color: #fff;
            margin-bottom: 20px;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: -1px;
            text-shadow: 4px 4px 0px rgba(255, 42, 42, 0.3);
            position: relative;
        }

        h1::before, h1::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
        }
        
        h1::before {
            left: 2px;
            text-shadow: -2px 0 red;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        
        h1::after {
            left: -2px;
            text-shadow: -2px 0 blue;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(78px, 9999px, 83px, 0); }
            20% { clip: rect(32px, 9999px, 14px, 0); }
            40% { clip: rect(9px, 9999px, 55px, 0); }
            60% { clip: rect(66px, 9999px, 88px, 0); }
            80% { clip: rect(42px, 9999px, 73px, 0); }
            100% { clip: rect(11px, 9999px, 99px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(12px, 9999px, 95px, 0); }
            20% { clip: rect(55px, 9999px, 33px, 0); }
            40% { clip: rect(87px, 9999px, 11px, 0); }
            60% { clip: rect(34px, 9999px, 77px, 0); }
            80% { clip: rect(98px, 9999px, 44px, 0); }
            100% { clip: rect(21px, 9999px, 66px, 0); }
        }

        h2 {
            font-family: 'Lato', sans-serif;
            font-weight: 900;
            font-size: 2rem;
            color: var(--accent);
            margin: 60px 0 20px 0;
            border-bottom: 1px solid var(--stroke);
            padding-bottom: 10px;
        }

        h3 {
            font-family: 'Lato', sans-serif;
            font-size: 1.4rem;
            color: #fff;
            margin: 40px 0 15px 0;
        }

        p {
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #ccc;
        }

        strong {
            color: #fff;
        }

        .summary-box {
            background: var(--glass);
            border: 1px solid var(--stroke);
            border-left: 4px solid var(--accent);
            padding: 25px;
            margin: 40px 0;
            border-radius: 4px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        ul, ol {
            margin-bottom: 20px;
            padding-left: 20px;
        }

        li {
            margin-bottom: 15px;
            color: #ccc;
            font-size: 1.1rem;
        }

        ol {
            font-family: 'DM Mono', monospace;
            font-size: 0.95rem;
        }

        ol li {
            padding-left: 10px;
            margin-bottom: 20px;
        }
        
        ol li::marker {
            color: var(--accent);
            font-weight: bold;
        }

        .noise {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        hr {
            border: 0;
            height: 1px;
            background: var(--stroke);
            margin: 60px 0;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--dim);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
        
        .audio-player {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--accent);
            padding: 10px 15px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 0 15px var(--accent-glow);
            backdrop-filter: blur(5px);
            font-family: 'DM Mono', monospace;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .audio-player:hover {
            box-shadow: 0 0 25px var(--accent-glow);
            background: rgba(255, 42, 42, 0.1);
        }

        .audio-player span {
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .playing-indicator {
            display: flex;
            gap: 3px;
            height: 15px;
            align-items: flex-end;
        }

        .playing-indicator .bar {
            width: 3px;
            background: var(--accent);
            animation: bounce 1s infinite alternate;
            height: 3px;
        }

        .audio-player.paused .playing-indicator .bar {
            animation: none;
            height: 3px !important;
        }

        .playing-indicator .bar:nth-child(1) { animation-delay: 0.1s; }
        .playing-indicator .bar:nth-child(2) { animation-delay: 0.3s; }
        .playing-indicator .bar:nth-child(3) { animation-delay: 0.5s; }

        @keyframes bounce {
            0% { height: 3px; }
            100% { height: 15px; }
        }
    </style>
</head>
